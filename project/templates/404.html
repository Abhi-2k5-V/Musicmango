{% extends 'base.html' %}

{% block title %}404 - Page Not Found | EduStream{% endblock %}

{% block content %}
<div class="row min-vh-75 d-flex align-items-center justify-content-center py-5">
    <div class="col-md-6 text-center">
        <div class="empty-state-icon text-danger mb-4">
            <i class="fa-solid fa-compass-drafting fa-spin-hover fa-4x text-indigo"></i>
        </div>
        <h1 class="display-4 fw-700 mb-2">404</h1>
        <h2 class="h4 text-muted mb-4">Page Not Found</h2>
        <p class="text-muted mb-4">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{{ url_for('index') }}" class="btn btn-indigo text-white px-4 py-2 rounded-pill shadow-sm">
            <i class="fa-solid fa-house me-1"></i> Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
